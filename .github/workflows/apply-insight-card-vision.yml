name: Apply insight card vision once

on:
  push:
    branches:
      - style/insight-card-vision

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: style/insight-card-vision

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply finishing insight refactor
        run: node scripts/apply-insight-card-vision.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: npm run test -- --run src/features/insights/style-effectiveness.test.ts src/features/insights/style-effectiveness-panel.test.tsx src/features/insights/selection-stats-section.test.tsx

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Redesign finishing pattern insights"
          git push origin HEAD:style/insight-card-vision
