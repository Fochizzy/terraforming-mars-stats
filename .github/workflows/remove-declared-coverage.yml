name: Remove declared coverage category

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-dashboard:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove Declared from optional data coverage
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/insights/insights-dashboard.tsx')
          source = path.read_text()

          chart_entry = """        {
            label: 'Declared',
            value: Math.round(selectedCoverage.declaredStyleCoverage * 100),
          },
"""
          badge = """                      <CoverageBadge
                        label=\"Declared style coverage\"
                        value={selectedCoverage.declaredStyleCoverage}
                      />
"""

          if source.count(chart_entry) != 1:
              raise SystemExit('Expected exactly one Declared chart entry')
          if source.count(badge) != 1:
              raise SystemExit('Expected exactly one Declared coverage badge')

          path.write_text(source.replace(chart_entry, '').replace(badge, ''))
          PY

      - name: Commit the change
        shell: bash
        run: |
          rm -f .github/workflows/remove-declared-coverage.yml
          rm -f .github/remove-declared-coverage-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove declared category from coverage chart"
          git push origin HEAD:main
