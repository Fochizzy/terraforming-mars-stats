# Integration workflow for the lineup effects UI branch.
name: Apply lineup effects polish

on:
  push:
    branches:
      - ui/lineup-effects-polish-20260715

permissions:
  contents: write

jobs:
  apply-lineup-effects-polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ui/lineup-effects-polish-20260715

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Patch insights dashboard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/insights/insights-dashboard.tsx')
          source = path.read_text()

          import_marker = "import { buildInsightCards } from './build-insight-cards';\n"
          import_replacement = (
              "import { buildInsightCards } from './build-insight-cards';\n"
              "import { LineupEffectsPanel } from './lineup-effects-panel';\n"
          )
          if source.count(import_marker) != 1:
              raise SystemExit('Could not locate buildInsightCards import exactly once')
          source = source.replace(import_marker, import_replacement, 1)

          truncate_helper = """function truncateLabel(value: string, length = 18) {
            if (value.length <= length) {
              return value;
            }

            return `${value.slice(0, length - 1)}…`;
          }

          """
          if source.count(truncate_helper) != 1:
              raise SystemExit('Could not locate truncateLabel helper exactly once')
          source = source.replace(truncate_helper, '', 1)

          selected_rows = """  const selectedLineupRows = selectedPlayer
            ? analytics.lineupEffectRows.filter((row) => row.playerId === selectedPlayer.id)
            : analytics.lineupEffectRows.slice(0, 6);
          """
          selected_rows_replacement = """  const selectedLineupRows = selectedPlayer
            ? analytics.lineupEffectRows.filter((row) => row.playerId === selectedPlayer.id)
            : analytics.lineupEffectRows;
          """
          if source.count(selected_rows) != 1:
              raise SystemExit('Could not locate selectedLineupRows assignment exactly once')
          source = source.replace(selected_rows, selected_rows_replacement, 1)

          section_start = source.index('          <ChartFrame title="Lineup Effects">')
          section_end = source.index(
              '          <ChartFrame title="Interaction Insights">',
              section_start,
          )
          section_replacement = """          <ChartFrame
            description="See how each player performs with different table lineups."
            title="Lineup Effects"
          >
            <LineupEffectsPanel
              rows={selectedLineupRows}
              selectedPlayerName={selectedPlayer?.displayName ?? null}
            />
          </ChartFrame>

          """
          source = source[:section_start] + section_replacement + source[section_end:]

          path.write_text(source)
          PY

          rm .github/workflows/apply-lineup-effects-polish.yml

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: npm run test -- --run src/features/insights/lineup-effects-panel.test.tsx src/features/insights/insights-dashboard.test.tsx src/components/charts/chart-frame.test.tsx

      - name: Type-check
        run: npx tsc --noEmit

      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/insights/insights-dashboard.tsx .github/workflows/apply-lineup-effects-polish.yml
          git commit -m "Polish lineup effects dashboard UI"
          git push origin HEAD:ui/lineup-effects-polish-20260715
