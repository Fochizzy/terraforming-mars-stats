name: Apply group insights player checkbox fix

on:
  push:
    branches:
      - fix/group-insights-player-checkboxes-v2

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/group-insights-player-checkboxes-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply integration
        run: node scripts/apply-group-insights-player-checkbox-fix.mjs
      - name: Install dependencies
        run: npm ci
      - name: Run focused tests
        run: npm run test -- --run src/features/insights/player-combination-options.test.ts src/features/insights/insights-dashboard.test.tsx
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Keep group insight player checkboxes available"
          git push origin HEAD:fix/group-insights-player-checkboxes-v2
