name: Apply interaction insights UI

on:
  push:
    branches:
      - style/interaction-insights-ui

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: style/interaction-insights-ui

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply integration
        run: node scripts/apply-interaction-insights-ui.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run focused tests
        run: npm run test -- --run src/features/insights/interaction-insights-panel.test.tsx src/features/insights/insights-dashboard.test.tsx

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/insights/insights-dashboard.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Integrate redesigned interaction insights panel"
          git push origin HEAD:style/interaction-insights-ui
