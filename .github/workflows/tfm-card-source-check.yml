name: Terraforming Mars card source check

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

jobs:
  check-card-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Terraforming Mars card source
        run: npm run catalog:check-source
