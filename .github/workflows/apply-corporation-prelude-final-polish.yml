name: Apply corporation Prelude final polish

on:
  push:
    branches:
      - format/corporation-prelude-pairings-all-12

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply component polish
        run: node scripts/apply-corporation-prelude-final-polish.mjs
      - name: Install dependencies
        run: npm ci
      - name: Run focused test
        run: npx vitest run src/features/insights/corporation-prelude-pairings.test.tsx
      - name: Commit integrated result
        run: |
          rm scripts/apply-corporation-prelude-final-polish.mjs
          rm .github/workflows/apply-corporation-prelude-final-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/insights/corporation-prelude-pairings.tsx src/features/insights/corporation-prelude-pairings.test.tsx scripts/apply-corporation-prelude-final-polish.mjs .github/workflows/apply-corporation-prelude-final-polish.yml
          git commit -m "Complete corporation and Prelude UI polish"
          git push
