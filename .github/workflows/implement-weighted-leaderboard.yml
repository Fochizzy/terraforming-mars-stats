name: Implement weighted leaderboard chart

on:
  push:
    branches:
      - enhance/weighted-leaderboard-chart
    paths:
      - .github/workflows/implement-weighted-leaderboard.yml
      - scripts/implement-weighted-leaderboard.mjs
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/implement-weighted-leaderboard.yml
      - scripts/implement-weighted-leaderboard.mjs

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: enhance/weighted-leaderboard-chart

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply chart enhancement
        run: node scripts/implement-weighted-leaderboard.mjs

      - name: Run focused tests
        run: npm run test -- --run src/features/insights/insights-dashboard.test.tsx

      - name: Build application
        run: npm run build

      - name: Commit implementation
        run: |
          rm scripts/implement-weighted-leaderboard.mjs
          rm .github/workflows/implement-weighted-leaderboard.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/insights/insights-dashboard.tsx src/features/insights/insights-dashboard.test.tsx scripts/implement-weighted-leaderboard.mjs .github/workflows/implement-weighted-leaderboard.yml
          git commit -m "Enhance weighted leaderboard comparison"
          git push origin HEAD:enhance/weighted-leaderboard-chart
