name: Apply selection statistics UI

on:
  push:
    branches:
      - tm-stats-app
    paths:
      - .github/workflows/apply-selection-stat-table-ui.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tm-stats-app
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply table redesign
        shell: bash
        env:
          COMPONENT_GZ_B64: 
        run: |
          printf '%s' "$COMPONENT_GZ_B64" | base64 -d | gzip -d > src/features/insights/selection-stat-table.tsx
      - name: Install dependencies
        run: npm ci
      - name: Run focused tests
        run: npx vitest run src/features/insights/selection-stat-table.test.tsx
      - name: Commit implementation
        shell: bash
        run: |
          rm .github/workflows/apply-selection-stat-table-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/features/insights/selection-stat-table.tsx .github/workflows/apply-selection-stat-table-ui.yml
          git commit -m "Complete selection statistics table UI"
          git push origin HEAD:tm-stats-app
