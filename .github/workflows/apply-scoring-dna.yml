name: Apply scoring DNA integration

on:
  push:
    branches:
      - feat/scoring-dna-panel

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.head_commit.message != 'Integrate scoring DNA panel [dna-generated]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/scoring-dna-panel
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Apply integration codemod
        run: python scripts/apply-scoring-dna.py
      - name: Install dependencies
        run: npm ci
      - name: Run focused tests
        run: npm run test -- --run src/features/insights/insights-dashboard.test.tsx
      - name: Build
        run: npm run build
      - name: Commit generated integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Integrate scoring DNA panel [dna-generated]"
          git push origin HEAD:feat/scoring-dna-panel
